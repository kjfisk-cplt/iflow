name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure_as_code/environments/**/*.tf'
      - 'infrastructure_as_code/environments/**/*.tfvars'
      - '.github/workflows/terraform-plan.yml'

permissions:
  id-token: write      # Required for OIDC authentication
  contents: read       # Read repository content
  pull-requests: write # Post plan output as PR comment

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history for accurate git diff
      
      - name: Detect changed modules
        id: set-matrix
        run: |
          # Get list of changed files compared to main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          
          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          # Extract unique module paths (infrastructure_as_code/environments/{env}/int_{module})
          MODULES=$(echo "$CHANGED_FILES" | \
            grep -oP 'infrastructure_as_code/environments/[^/]+/int_[^/]+' | \
            sort -u | \
            jq -R -s -c 'split("\n")[:-1]')
          
          if [ "$MODULES" = "[]" ] || [ -z "$MODULES" ]; then
            echo "No Terraform modules changed"
            echo "matrix={\"module\":[]}" >> $GITHUB_OUTPUT
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "Detected modules: $MODULES"
            echo "matrix={\"module\":$MODULES}" >> $GITHUB_OUTPUT
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi
  
  plan:
    name: Plan ${{ matrix.module }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Continue even if one module fails
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.0
      
      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      
      - name: Extract module metadata
        id: metadata
        run: |
          MODULE_PATH="${{ matrix.module }}"
          ENV=$(echo $MODULE_PATH | cut -d'/' -f3)
          MODULE=$(echo $MODULE_PATH | cut -d'/' -f4)
          
          echo "env=$ENV" >> $GITHUB_OUTPUT
          echo "module=$MODULE" >> $GITHUB_OUTPUT
          echo "Module: $MODULE, Environment: $ENV"
      
      - name: Terraform Format Check
        working-directory: ${{ matrix.module }}
        run: terraform fmt -check -recursive
        continue-on-error: true
      
      - name: Terraform Init
        working-directory: ${{ matrix.module }}
        run: |
          terraform init \
            -backend-config="../backend.conf" \
            -backend-config="key=${{ steps.metadata.outputs.module }}.tfstate"
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      
      - name: Terraform Validate
        working-directory: ${{ matrix.module }}
        run: terraform validate
      
      - name: Terraform Plan
        id: plan
        working-directory: ${{ matrix.module }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt
          
          # Store exit code
          echo "exit-code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        continue-on-error: true
      
      - name: Generate plan summary
        id: summary
        working-directory: ${{ matrix.module }}
        run: |
          PLAN_OUTPUT=$(cat plan-output.txt)
          
          # Extract resource changes
          CHANGES=$(echo "$PLAN_OUTPUT" | grep -oP 'Plan: \K.*' || echo "No changes detected")
          
          # Truncate for GitHub comment (max 65536 chars)
          TRUNCATED_PLAN=$(echo "$PLAN_OUTPUT" | head -c 60000)
          if [ ${#PLAN_OUTPUT} -gt 60000 ]; then
            TRUNCATED_PLAN="$TRUNCATED_PLAN\n\n... (output truncated)"
          fi
          
          # Store in file for next step
          echo "$TRUNCATED_PLAN" > plan-truncated.txt
          echo "$CHANGES" > plan-summary.txt
      
      - name: Comment plan on PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planExists = fs.existsSync('${{ matrix.module }}/plan-truncated.txt');
            
            if (!planExists) {
              console.log('Plan output not found, skipping comment');
              return;
            }
            
            const planOutput = fs.readFileSync('${{ matrix.module }}/plan-truncated.txt', 'utf8');
            const summary = fs.readFileSync('${{ matrix.module }}/plan-summary.txt', 'utf8');
            const exitCode = '${{ steps.plan.outputs.exit-code }}';
            
            const statusIcon = exitCode === '0' ? '✅' : '❌';
            const statusText = exitCode === '0' ? 'Success' : 'Failed';
            
            const body = `## ${statusIcon} Terraform Plan: \`${{ steps.metadata.outputs.module }}\` (\`${{ steps.metadata.outputs.env }}\`)
            
            **Status:** ${statusText}
            **Changes:** ${summary}
            
            <details>
            <summary>Show Full Plan</summary>
            
            \`\`\`hcl
            ${planOutput}
            \`\`\`
            
            </details>
            
            ---
            *Workflow:* \`${{ github.workflow }}\` | *Run:* [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Upload plan artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: steps.plan.outputs.exit-code == '0'
        with:
          name: tfplan-${{ steps.metadata.outputs.env }}-${{ steps.metadata.outputs.module }}
          path: ${{ matrix.module }}/tfplan
          retention-days: 5
      
      - name: Fail job if plan failed
        if: steps.plan.outputs.exit-code != '0'
        run: exit 1
