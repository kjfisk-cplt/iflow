# backend.conf — populate per environment and pass to every stack at init time:
# terraform init -backend-config="../../backend.conf" -reconfigure

resource_group_name  = "rg-tfstate-iflow"
storage_account_name = "stoterraformstate"
container_name       = "tfstate"
# key is set per-stack via: -backend-config="key=int_network.tfstate"